name: ASP Physics — Release to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # Triggered by semver tags: v0.1.0, v1.0.0, etc.

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publisher (OIDC)

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build manylinux wheels (Linux x86_64 + aarch64)
  # ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Generate Python gRPC stubs
        run: |
          pip install grpcio-tools
          python -m grpc_tools.protoc \
            -I go_services/proto \
            --python_out=python/asp/orchestrator \
            --grpc_python_out=python/asp/orchestrator \
            go_services/proto/asp_cluster.proto
          # Fix relative imports for Python 3 package structure
          sed -i 's/^import asp_cluster_pb2/from . import asp_cluster_pb2/' \
            python/asp/orchestrator/asp_cluster_pb2_grpc.py

      - name: Build manylinux wheels via maturin-action
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto           # Uses manylinux_2_28 (GLIBC 2.28+)
          args: >
            --release
            --locked
            --out dist
            --interpreter python3.10 python3.11 python3.12
          sccache: 'true'           # Shared compilation cache

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Build macOS wheels (Intel + Apple Silicon)
  # ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS wheels (${{ matrix.target }})
    runs-on: macos-14              # Apple Silicon runner
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install system dependencies
        run: brew install protobuf

      - name: Generate Python gRPC stubs
        run: |
          pip install grpcio-tools
          python -m grpc_tools.protoc \
            -I go_services/proto \
            --python_out=python/asp/orchestrator \
            --grpc_python_out=python/asp/orchestrator \
            go_services/proto/asp_cluster.proto
          sed -i '' 's/^import asp_cluster_pb2/from . import asp_cluster_pb2/' \
            python/asp/orchestrator/asp_cluster_pb2_grpc.py

      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: >
            --release
            --locked
            --out dist
            --interpreter python3.10 python3.11 python3.12
          sccache: 'true'

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Build Windows wheels
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows wheels (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Generate Python gRPC stubs
        run: |
          pip install grpcio-tools
          python -m grpc_tools.protoc `
            -I go_services/proto `
            --python_out=python/asp/orchestrator `
            --grpc_python_out=python/asp/orchestrator `
            go_services/proto/asp_cluster.proto
          (Get-Content python/asp/orchestrator/asp_cluster_pb2_grpc.py) `
            -replace '^import asp_cluster_pb2', 'from . import asp_cluster_pb2' |
            Set-Content python/asp/orchestrator/asp_cluster_pb2_grpc.py

      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: >
            --release
            --locked
            --out dist
            --interpreter python3.10 python3.11 python3.12
          sccache: 'true'

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist/*.whl
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Build pure-Python sdist
  # ─────────────────────────────────────────────────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Security audit before publish
  # ─────────────────────────────────────────────────────────────────
  security-audit:
    name: Cargo security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # JOB 6: Publish to PyPI (OIDC Trusted Publisher — no API key stored)
  # ─────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/asp-physics
    needs:
      - build-linux
      - build-macos
      - build-windows
      - build-sdist
      - security-audit
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false      # Fail hard if version already exists
          verbose: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 7: Create GitHub Release with changelog
  # ─────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true